volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    env_file: ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ../backend
    env_file: ../.env
    volumes:
      - static:/app/static_foodgram
      - media:/app/media
      - ../data:/app/data
    depends_on:
      - db

  frontend:
    container_name: foodgram-front
    build: ../frontend
    volumes:
      - ../frontend/:/app/result_build/
  gateway:
    build: ../nginx/
    env_file: ../.env
    ports:
      - 7000:80
    volumes:
      - static:/static
      - media:/media
    depends_on:
      - backend
      - frontend
