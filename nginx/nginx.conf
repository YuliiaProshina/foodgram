server {
  listen 80;
  index index.html;
  client_max_body_size 50M;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:7000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:7000/admin/;
  }

  location /static/admin/ {
       alias /static/admin;
  }

  location /static/ {
        alias /static/static/;
    }

  location /media/ {
        alias /media/;
    }

  location / {
    root /static;
    try_files $uri /index.html;
  }
}