volumes:
  pg_data_production:
  django_static_volume:
  frontend_static_volume:
  media_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: yuliaproshina/foodgram_backend
    env_file: .env
    volumes:
      - django_static_volume:/app/static_foodgram
      - media_volume:/app/media
  frontend:
    image: yuliaproshina/foodgram_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - frontend_static_volume:/frontend_static
  gateway:
    image: yuliaproshina/foodgram_gateway
    env_file: .env
    volumes:
      - django_static_volume:/static_foodgram
      - frontend_static_volume:/frontend_static
      - media_volume:/media
    ports:
      - 7000:80