volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: yuliaproshina/foodgram_backend
    env_file: .env
    volumes:
      - static_volume:/app/static_foodgram
      - media_volume:/app/media
      - ./data:/app/data
  frontend:
    image: yuliaproshina/foodgram_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static
  gateway:
    image: yuliaproshina/foodgram_gateway
    env_file: .env
    volumes:
      - static_volume:/static
      - media_volume:/media
    ports:
      - 7000:80